apiVersion: v1
kind: Service
metadata:
  name: redis-headless
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  ports:
  - protocol: TCP
    port: 6379 # service port
    targetPort: 6379 # container port
  clusterIP: None # this is called as headless service
  selector:
    project: roboshop
    tier: db
    component: redis
---
apiVersion: v1
kind: Service
metadata:
  name: redis
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: redis
spec:
  ports:
  - protocol: TCP
    port: 6379 # service port
    targetPort: 6379 # container port
  selector:
    project: roboshop
    tier: db
    component: redis
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: redis
  namespace: roboshop
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: redis
  serviceName: "redis-headless"
  replicas: 1
  template:
    metadata:
      labels:
       project: roboshop
       tier: db
       component: redis
    spec:
      containers:
      - name: redis
        image: redis:7
        volumeMounts:
        - name: redis
          mountPath: /data
  # pvc
  volumeClaimTemplates:
  - metadata:
      name: redis
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 1Gi