apiVersion: v1
kind: ConfigMap
metadata:
   name: mysql
   namespace: roboshop
data:
  MYSQL_ROOT_PASSWORD: RoboShop@1
---
apiVersion: v1
kind: Service
metadata:
  name: mysql-headless
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  ports:
  - protocol: TCP
    port: 3306 # service port
    targetPort: 3306 # container port
  clusterIP: None # this is called as headless service
  selector:
    project: roboshop
    tier: db
    component: mysql
---
apiVersion: v1
kind: Service
metadata:
  name: mysql
  namespace: roboshop
  labels:
    project: roboshop
    tier: db
    component: mysql
spec:
  ports:
  - protocol: TCP
    port: 3306 # service port
    targetPort: 3306 # container port
  selector:
    project: roboshop
    tier: db
    component: mysql
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: mysql
  namespace: roboshop
spec:
  selector:
    matchLabels:
      project: roboshop
      tier: db
      component: mysql
  serviceName: "mysql-headless"
  replicas: 1
  template:
    metadata:
      labels:
       project: roboshop
       tier: db
       component: mysql
    spec:
      containers:
      - name: mysql
        image: pandu15/mysql:v2
        args: ["--mysql-native-password=ON"]
        envFrom:
        - configMapRef:
            name: mysql
        volumeMounts:
        - name: mysql
          mountPath: /var/lib/mysql
  # pvc
  volumeClaimTemplates:
  - metadata:
      name: mysql
    spec:
      accessModes: [ "ReadWriteOnce" ]
      storageClassName: "roboshop-ebs"
      resources:
        requests:
          storage: 1Gi